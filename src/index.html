<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="./css/cover.css">
    <link rel="stylesheet" href="./css/data.css">
    <link rel="stylesheet" href="./css/playlistZone.css">
    <link rel="stylesheet" href="./css/controls.css">
    <link rel="stylesheet" href="./assets/fontAwesome/webfonts/all.min.css">
    <link rel="stylesheet" href="./css/animate.min.css">
    <link rel="icon" href="../build/icon.png">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <meta http-equiv="X-Content-Security-Policy"
        content="default-src 'self'; img-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <title>NovaBeats</title>
</head>

<body id="novaBody" class="animate__zoomIn">
    <div class="reproductor">
        <main class="titlebar">
            <div id="barra-cerrar" class="barra-cerrar">
                <div id="novabeats" class="novabeats" >
                    <img src="./assets/images/logo.png" alt="" width="48" height="48" >
                    <h2 class="animate__animated animate__fadeIn novabeats">NovaBeats</h2>
                </div>
                <span> &nbsp; </span>
                <div class="container-button">
                    <div class="container-button-main ">
                        <button id="minimizar" class="minimizar yellow" title="Minimizar"><i
                                class="fa-solid fa-window-minimize"></i></button>
                    </div>
                    <div class="container-button-main">
                        <button id="compactBtn" class="minimizar yellow"><i class="fa-regular fa-square"
                                title="Modo Compacto"></i></button>
                    </div>
                    <div class="container-button-main ">
                        <button id="cerrar" class="cerrar red"><i class="fa-solid fa-xmark" title="Cerrar"></i></button>
                    </div>
                </div>

            </div>
            <div class="datos">
                <div class="titulos">
                    <div class="textos-titulos">
                        <h1 class="title textos" id="title"></h1>
                        <p class="separacion textos"> / </p>
                        <p class="artist textos" id="artist"></p>
                        <span class="espacio"></span>
                        <h1 class="title textos duplicado" id="titleDuplicado"></h1>
                        <p class="separacion textos duplicado"> / </p>
                        <p class="artist textos duplicado" id="artistDuplicado"></p>
                        <span class="espacio"></span>
                        <h1 class="title textos duplicado" id="titleTriplicado"></h1>
                        <p class="separacion textos duplicado"> / </p>
                        <p class="artist textos duplicado" id="artistTriplicado"></p>
                        <span class="espacio"></span>
                    </div>
                    <div id="visualizer" class="visualizer"></div>
                </div>
            </div>
            <div class="caratula">
                <img id="cover" class="animate__animated animate__fadeIn" src="" alt="cover">
            </div>
            <div class="navegador">
                <div class="progreso">
                    <input class="barra-progreso" id="progress" type="range" value="0" min="0" max="100" step="0.1" />
                    <p class="tiempo-progreso" id="tiempo-progreso">00:00 / 00:00</p>
                </div>
                <div class="volumen">
                    <div class="vol-text">
                        <p>Volumen: </p>
                        <p id="volumen-texto"><span class="volumen-cantidad"> 100</span></p>
                    </div>
                    <input id="volumen-control" class="volumen-control" type="range" value="1" min="0" max="1"
                        step="0.05">
                </div>
                <div class="control-principal">
                    <audio id="player"></audio>
                    <button id="previousBtn"><i class="fa-solid fa-backward-step buttons" title="Anterior"></i></button>
                    <button id="playBtn" title="Play"><i class="fa-solid fa-circle-play play"></i></button>
                    <button id="nextBtn"><i class="fa-solid fa-forward-step buttons" title="Siguiente"></i></button>
                </div>
                <div class="control-secundario">
                    <button id="repeatBtn" class="repeat-container" title="Repetir" >
                        <i class="fa-solid fa-repeat repeat"></i>
                    </button>
                    <button><i id="suffle" class="fa-solid fa-shuffle suffle suffleNoActive"
                            title="Mezclar"></i></button>
                </div>
            </div>
            <div class="playlistZone">
                <div class="listBtn">
                    <button id="isFolderBtn" class="isFolderBtn"><i class="fa-solid fa-folder-open folder"></i><span
                            class="folderText" title="Elegir carpeta de Musica">Carpeta</span></button>
                    <button id="isFileBtn" class="isFolderBtn"><i class="fa-regular fa-file folder"></i><span
                            class="folderText" title="Elegir Archivo de Musica">Archivo</span></button>
                    <button id="isListBtn" class="isFolderBtn"><i class="fa-regular fa-rectangle-list folder"></i><span
                            class="folderText" title="Elegir o guardar lista">Listas</span></button>
                </div>
                <hr class="division">
                <div class="playListContent">
                    <p>Lista de reproducción</p>
                    <div class="playList">
                        <div id="guardarPlaylist" class="guardarPlaylist hidden">
                            <p>Guardar Playlist</p><input id="inputGuardar" type="text" /><button id="listBtn"
                                title="Guardar Lista">Guardar</button>
                        </div>
                        <span id="line" class="line hidden">
                            <hr>
                        </span>
                        <div id="ambasListas">
                            <div id="listaVacia" class="listaVacia hidden">
                                <h2>NovaBeats</h2>
                                <p>-- Seleccione una carpeta o archivo para comenzar --</p>
                            </div>
                            <ul id="listaReproduccion" class=""></ul>
                            <ul id="lista-playlist" class="hidden"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>


    <script type="module" src="./modules/renderer.js"></script>
</body>

</html>
