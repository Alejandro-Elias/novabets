app-id: io.github.alejandroelias.novaBeats
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"

command: NovaBeats

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: NovaBeats
    buildsystem: simple
    build-commands:
      - npm install
      - npm run build

    sources:
      - type: dir
        path: .