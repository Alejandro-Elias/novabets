app-id: io.github.alejandroelias.NovaBeats

runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk

base: org.electronjs.Electron2.BaseApp
base-version: "25.08"

command: run.sh

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio

  - --filesystem=home:ro
  - --filesystem=/run/media
  - --filesystem=/media
  - --filesystem=/mnt

  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.portal.Desktop

modules:
  - name: novabeats
    buildsystem: simple

    build-commands:
      - mkdir -p /app/nova

      - cp -r build /app/nova/
      - cp package.json /app/nova/

      - install -Dm755 run.sh /app/bin/run.sh

      - install -Dm644 io.github.alejandroelias.NovaBeats.desktop \
          /app/share/applications/io.github.alejandroelias.NovaBeats.desktop

      - install -Dm644 io.github.alejandroelias.NovaBeats.metainfo.xml \
          /app/share/metainfo/io.github.alejandroelias.NovaBeats.metainfo.xml

      - install -Dm644 build/icon.png \
          /app/share/icons/hicolor/512x512/apps/io.github.alejandroelias.NovaBeats.png

    sources:
      - type: dir
        path: .