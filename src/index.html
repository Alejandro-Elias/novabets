<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="./styles/cover.css">
    <link rel="stylesheet" href="./styles/data.css">
    <link rel="stylesheet" href="./styles/playlistZone.css">
    <link rel="stylesheet" href="./styles/controls.css">
    <link rel="stylesheet" href="./fontAwesome/webfonts/all.min.css">
    <link rel="icon" href="../build/icon.png">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' blob:; script-src 'self';" />
    <meta http-equiv="X-Content-Security-Policy"
        content="default-src 'self'; img-src 'self' blob:; script-src 'self';" />
    <title>NovaBets</title>
</head>

<body>
    <div class="barra-cerrar">
        <div class="container-button-main ">
            <button id="minimizar" class="minimizar yellow">-</button>
        </div>
        <div class="container-button-main ">
            <button id="cerrar" class="cerrar red">x</button>
        </div>
    </div>
    <div class="reproductor">
        <main class="titlebar">
            <div class="datos">
                <div class="titulos ">
                    <h2 class="title" id="title"></h2>
                    <p class="artist" id="artist"></p>
                </div>
                <div class="progreso">
                    <input class="barra-progreso" id="progress" type="range" value="0" min="0" max="100" step="0.1" />
                    <p class="tiempo-progreso" id="tiempo-progreso">00:00 / 00:00</p>
                </div>
            </div>
            <div class="caratula">
                <img id="cover" src="" alt="cover">
            </div>
            <div class="navegador">
                <div class="volumen">
                    <div class="vol-text">
                        <p>Volumen: </p>
                        <p id="volumen-texto"><span class="volumen-cantidad"> 100</span></p>
                    </div>
                    <input id="volumen-control" class="volumen-control" type="range" value="1" min="0" max="1"
                        step="0.05">
                </div>
                <div class="control-principal">
                    <audio id="player"></audio>
                    <button id="previousBtn"><i class="fa-solid fa-circle-arrow-left buttons"></i></button>
                    <button id="stopBtn"><i class="fa-solid fa-circle-stop buttons"></i></button>
                    <button id="playBtn"><i class="fa-solid fa-circle-play play"></i></button>
                    <button id="nextBtn"><i class="fa-solid fa-circle-arrow-right buttons"></i></button>
                </div>
                <button class="control-secundario">
                    <div class="repeat-container">
                        <i id="repeatBtn" class="fa-solid fa-repeat repeat"><span id="repeatText"
                                class="one-all">one</span></i>
                    </div>
                    <i id="suffle" class="fa-solid fa-shuffle suffleNoActive"></i>
                </button>
            </div>
            <div class="playlistZone">
                <div class="listBtn">
                    <button id="idFolderBtn" class="isFolderBtn"><i class="fa-solid fa-folder-open folder"></i><span
                            class="folderText">Carpeta</span></button>
                    <button id="idFileBtn" class="isFolderBtn"><i class="fa-regular fa-file folder"></i><span
                            class="folderText">Archivo</span></button>
                    <button id="isListBtn" class="isFolderBtn"><i class="fa-regular fa-rectangle-list folder"></i><span
                            class="folderText">Listas</span></button>
                </div>
                <div class="playListContent">
                    <p>Lista de reproducción</p>
                    <div class="playList">
                        <ul id="listaReproduccion"></ul>
                    </div>
                </div>
            </div>
        </main>
    </div>


    <script type="module" src="./renderer.js"></script>
</body>

</html>
